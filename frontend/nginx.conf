server {
    listen 80;
    server_name localhost;

    # Thư mục chứa file build của React
    root /usr/share/nginx/html;
    index index.html;

    # ─── QUAN TRỌNG: React Router (SPA) ───────────────────────────────────
    # Redirect tất cả routes về index.html để React Router xử lý
    # Nếu không có dòng này: reload trang /dashboard → Nginx trả về 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache static assets (JS, CSS, fonts, images) 1 năm ───────────────
    # Vite đã tự thêm content hash vào tên file (app.abc123.js)
    # nên không lo cache file cũ khi deploy version mới
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Không cache HTML ─────────────────────────────────────────────────
    # Đảm bảo browser luôn lấy index.html mới nhất khi deploy
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ─── Bảo mật: Ẩn version Nginx ────────────────────────────────────────
    server_tokens off;

    # ─── Giới hạn kích thước upload ───────────────────────────────────────
    client_max_body_size 50M;
}
